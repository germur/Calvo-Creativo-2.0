# Netlify headers for performance & SEO
# Note: Trailing slash handling is done by Next.js (trailingSlash: false in next.config.mjs)
# DO NOT add Netlify-level trailing slash redirects — they conflict with @netlify/plugin-nextjs.

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "index, follow"

[[headers]]
  for = "/textures/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 410 Gone para /services/strategic-seo-consulting/* se maneja en middleware.ts
# (netlify.toml redirects no funcionan con @netlify/plugin-nextjs)

[[plugins]]
package = "@netlify/plugin-nextjs"
