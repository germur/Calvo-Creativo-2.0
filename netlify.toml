# Netlify headers for performance & SEO
# Note: Trailing slash handling is done by Next.js (trailingSlash: false in next.config.mjs)
# DO NOT add Netlify-level trailing slash redirects — they conflict with @netlify/plugin-nextjs.

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "index, follow"

[[headers]]
  for = "/textures/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ================================================================
# 410 GONE — páginas programáticas de ciudad (sin equivalente ES)
# force = true garantiza que gane sobre los redirects de Next.js
# ================================================================
[[redirects]]
  from = "/services/strategic-seo-consulting/gainesville-fl"
  to = "/404"
  status = 410
  force = true

[[redirects]]
  from = "/services/strategic-seo-consulting/sarasota-fl"
  to = "/404"
  status = 410
  force = true

[[redirects]]
